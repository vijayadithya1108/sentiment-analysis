<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML Sentiment Analyzer</title>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 15px; }
        button:hover { background-color: #0056b3; }
        .result-box { background: #f8f9fa; padding: 15px; border-radius: 10px; min-height: 80px; }
        #verdict { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 10px; }
        #status { display: block; margin-bottom: 15px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sentiment Monitor</h2>
    <span id="status">Loading AI...</span>
    <textarea id="userInput" placeholder="Type your review here..."></textarea>
    <button id="analyzeBtn">Analyze Sentiment</button>
    
    <div class="result-box">
        <div>ML Confidence Score: <span id="score">0.00</span></div>
        <div id="verdict">Waiting for input...</div>
    </div>
</div>

<script>
    let sentiment;
    const input = document.getElementById('userInput');
    const scoreSpan = document.getElementById('score');
    const verdictSpan = document.getElementById('verdict');
    const statusSpan = document.getElementById('status');
    const btn = document.getElementById('analyzeBtn');

    console.log("Script starting...");

    // Initialize the model with ml5
    sentiment = ml5.sentiment('movieReviews', modelLoaded);

    function modelLoaded() {
        console.log("ML Model is fully loaded and functional!");
        statusSpan.innerText = "✅ AI Model Ready";
    }

    // Function to run when button is clicked
    btn.onclick = function() {
        const text = input.value;
        console.log("Analyzing text: " + text);

        if (!text) {
            alert("Please type something!");
            return;
        }

        // The actual ML prediction
        const prediction = sentiment.predict(text);
        console.log("Prediction result:", prediction);
        
        const score = prediction.score.toFixed(2);
        scoreSpan.innerText = score;

        if (score > 0.6) {
            verdictSpan.innerText = "Positive 😊";
            verdictSpan.style.color = "green";
        } else if (score < 0.4) {
            verdictSpan.innerText = "Negative 😞";
            verdictSpan.style.color = "red";
        } else {
            verdictSpan.innerText = "Neutral 😐";
            verdictSpan.style.color = "gray";
        }
    };
</script>


</body>
</html>
