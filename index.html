<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML Sentiment Analyzer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .result-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 20px; min-height: 60px; }
        #verdict { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 5px; }
        #status { color: #28a745; font-weight: bold; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sentiment Monitor</h2>
    <span id="status">✅ System Online</span>
    <textarea id="userInput" placeholder="Type your review here..."></textarea>
    <button onclick="analyze()">Analyze Sentiment</button>
    
    <div class="result-box">
        <div>Sentiment Score: <span id="score">0</span></div>
        <div id="verdict">Ready for analysis...</div>
    </div>
</div>

<script>
    // This uses a robust word-matching logic (Lexicon-based NLP)
    // highly effective for simple ML demonstrations
    const positiveWords = ['amazing', 'good', 'great', 'excellent', 'love', 'happy', 'best', 'learning', 'experience', 'awesome', 'cool', 'nice'];
    const negativeWords = ['bad', 'hate', 'terrible', 'worst', 'boring', 'sad', 'waste', 'ugly', 'useless', 'broken', 'difficult'];

    function analyze() {
        const text = document.getElementById('userInput').value.toLowerCase();
        const scoreSpan = document.getElementById('score');
        const verdictSpan = document.getElementById('verdict');
        
        if (!text) {
            alert("Please type something!");
            return;
        }

        let score = 0;
        const words = text.split(/\s+/);
        
        words.forEach(word => {
            if (positiveWords.includes(word)) score += 1;
            if (negativeWords.includes(word)) score -= 1;
        });

        scoreSpan.innerText = score;

        if (score > 0) {
            verdictSpan.innerText = "Positive 😊";
            verdictSpan.style.color = "green";
        } else if (score < 0) {
            verdictSpan.innerText = "Negative 😞";
            verdictSpan.style.color = "red";
        } else {
            verdictSpan.innerText = "Neutral 😐";
            verdictSpan.style.color = "gray";
        }
    }
</script>
</body>
</html>
